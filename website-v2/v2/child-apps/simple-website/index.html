<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简约风格网站</title>
    <link rel="stylesheet" href="./src/styles/simple.css">
</head>
<body>
    <div id="simple-app">
        <div class="simple-container">
            <header class="simple-header">
                <h1>简约风格</h1>
                <p>Less is more</p>
            </header>
            
            <main class="simple-content">
                <section class="content-section">
                    <h2>设计理念</h2>
                    <p>简约设计强调功能性和清晰性，去除不必要的装饰元素，让内容本身成为主角。</p>
                </section>
                
                <section class="content-section">
                    <h2>核心价值</h2>
                    <div class="value-grid">
                        <div class="value-item">
                            <div class="value-icon">✨</div>
                            <h3>简洁</h3>
                            <p>去除冗余，突出本质</p>
                        </div>
                        <div class="value-item">
                            <div class="value-icon">🎯</div>
                            <h3>专注</h3>
                            <p>专注于核心功能</p>
                        </div>
                        <div class="value-item">
                            <div class="value-icon">💡</div>
                            <h3>智慧</h3>
                            <p>智慧的设计选择</p>
                        </div>
                    </div>
                </section>
                
                <section class="content-section">
                    <h2>关于我们</h2>
                    <p>我们相信最好的设计是那些几乎不被注意到的设计，它们自然地融入用户的生活，提供流畅而愉悦的体验。</p>
                </section>
            </main>
        </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
